<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Career Insights AI | Database Query Result</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        body{
            background:linear-gradient(135deg,#111827,#312e81,#1e3a8a);
            font-family:Arial,Helvetica,sans-serif;
        }

        .glass{
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,.15);
        }

        .fade{
            animation:fade .8s ease;
        }

        @keyframes fade{

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

    </style>

</head>

<body class="min-h-screen flex items-center justify-center px-6 py-10">

<div class="glass rounded-3xl shadow-2xl max-w-4xl w-full p-10 fade">

    <!-- Logo -->

    <div class="flex justify-center">

        <img
        src="https://img.icons8.com/fluency/96/artificial-intelligence.png"
        class="w-20"
        alt="Career Insights AI">

    </div>

    <h1 class="text-4xl font-bold text-center text-white mt-5">

        Career Insights AI

    </h1>

    <p class="text-center text-blue-300 mt-2">

        Database Query Result

    </p>

    <!-- Query -->

    <div class="mt-10">

        <h2 class="text-2xl font-bold text-cyan-300 mb-4">

            🔍 Your Query

        </h2>

        <div class="glass rounded-2xl p-6">

            <p class="text-gray-200 text-lg">

                {{ query }}

            </p>

        </div>

    </div>

    <!-- Answer -->

    <div class="mt-8">

        <h2 class="text-2xl font-bold text-green-300 mb-4">

            📊 Query Result

        </h2>

        <div class="glass rounded-2xl p-6">

            <p class="text-gray-200 leading-8 whitespace-pre-line">

                {{ answer }}

            </p>

        </div>

    </div>

    <!-- Buttons -->

    <div class="flex flex-col md:flex-row justify-center gap-5 mt-10">

        <a href="/query_db"

        class="bg-gradient-to-r
        from-purple-500
        to-blue-600
        text-white
        font-semibold
        px-8
        py-4
        rounded-xl
        text-center
        hover:scale-105
        duration-300">

            🔄 Ask Another Query

        </a>

        <a href="/"

        class="border
        border-gray-500
        text-white
        px-8
        py-4
        rounded-xl
        text-center
        hover:bg-white/10
        duration-300">

            🏠 Back to Home

        </a>

    </div>

    <!-- Footer -->

    <div class="mt-10 border-t border-gray-700 pt-6 text-center">

        <p class="text-gray-400">

            Powered by
            <span class="text-blue-300 font-semibold">OpenAI</span>,
            <span class="text-purple-300 font-semibold">LangChain</span>,
            <span class="text-cyan-300 font-semibold">FAISS</span>,
            and
            <span class="text-green-300 font-semibold">Flask</span>

        </p>

    </div>

</div>

</body>

</html>
